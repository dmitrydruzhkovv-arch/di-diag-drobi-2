<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Диагностика дробей — где ты сейчас</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://dmitrydruzhkovv-arch.github.io/di-brand-kit/brand-kit.css">
  <style>
    html { scroll-behavior: smooth; }
    [hidden] { display: none !important; }
    .hidden { display: none !important; }

    /* Вспышки ромбов просвечивают СКВОЗЬ контент на время анимации (blend screen),
       кликов не ловят. Верно → зелёная «correct», неверно → красная «wrong». */
    #lk-fx-ok, #lk-fx-bad { z-index: 9999; mix-blend-mode: screen; }
    /* красная вспышка «неверно» длиннее на ~20% (D 27.06): кит 1.04s → 1.25s */
    .lk-flash-wrong.is-on { animation-duration: 1.25s; }

    /* ─── Шапка: прогресс ─── */
    .hw-header {
      position: sticky; top: 0; z-index: 20;
      background: rgba(10, 6, 16, 0.92);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--lk-line); padding: 11px 18px;
    }
    .hw-header-inner { max-width: 560px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
    /* подпись-бейджи Λ D. в шапке — всегда видны (попадают на любой скриншот) */
    .hw-sign { display: flex; gap: 5px; flex: 0 0 auto; align-items: center; }
    .hw-sign .lk-badge { border-radius: 50%; display: grid; place-items: center; font-weight: 900; color: #fff; }

    .hw-prog-label {
      font-family: var(--lk-mono); font-size: 12px; font-weight: 700;
      color: var(--lk-muted); white-space: nowrap; letter-spacing: .08em;
    }

    /* ─── Карточка вопроса ─── */
    .task-card { margin-bottom: 18px; animation: lk-in .35s ease; }
    .task-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .task-label {
      font-family: var(--lk-mono); font-size: 12px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase; color: var(--lk-violet);
    }
    .task-label .og { color: var(--lk-indigo); }

    .cond { font-size: 21px; line-height: 1.45; font-weight: 700; margin: 0 0 18px; color: var(--lk-ink); }
    .cond .lk-hl { color: var(--lk-violet); }

    .qfig { display: flex; justify-content: center; margin: 0 0 20px; }

    /* ─── Варианты (choice) ─── */
    .opts { display: flex; flex-direction: column; gap: 11px; }
    .opt {
      text-align: left; width: 100%; cursor: pointer; display: flex; align-items: center; gap: 14px;
      background: var(--lk-surface); color: var(--lk-ink);
      border: 1.5px solid var(--lk-line); border-radius: var(--lk-r-lg);
      padding: 16px 17px; font-size: 18px; font-weight: 600;
      transition: transform .12s ease, border-color .2s, box-shadow .2s, background .2s;
    }
    .opt:active { transform: scale(.99); }
    .opt .opt-key {
      flex: 0 0 30px; width: 30px; height: 30px; border-radius: 9px;
      display: grid; place-items: center; font-size: 14px; font-weight: 800;
      font-family: var(--lk-mono); background: rgba(168,85,247,.14); color: var(--lk-violet);
      border: 1px solid var(--lk-line);
    }
    .opt:not(.is-locked):hover { border-color: var(--lk-indigo); }
    .opt.is-locked { cursor: default; opacity: .5; }
    /* раскрытие правильности по ходу (диагностика показывает сразу) */
    .opt.correct { border-color: var(--lk-ok); background: rgba(52,211,153,.12);
      box-shadow: 0 0 26px rgba(52,211,153,.22); opacity: 1; }
    .opt.correct .opt-key { background: var(--lk-ok); color: #04231a; }
    .opt.wrong { border-color: var(--lk-bad); background: rgba(244,63,94,.10);
      box-shadow: 0 0 26px rgba(244,63,94,.2); opacity: 1; }
    .opt.wrong .opt-key { background: var(--lk-bad); color: #2a0410; }

    .next-btn { width: 100%; margin-top: 20px; }

    /* ─── Дроби / маркап ─── */
    .frac { display: inline-flex; flex-direction: column; align-items: center;
      font-family: var(--lk-mono); vertical-align: middle; line-height: 1.05; margin: 0 2px; }
    .frac .fn { border-bottom: 1.5px solid currentColor; padding: 0 5px 2px; }
    .frac .fd { padding: 2px 5px 0; }
    .lk-mono { font-family: var(--lk-mono); }

    /* ─── Живая объяснялка («живая математика», после ответа) ───
       Цвет-переменные старого движка переотображены на бренд-кит. */
    .explain {
      --neon: var(--lk-violet); --neon2: var(--lk-indigo); --ink: var(--lk-ink);
      --muted: var(--lk-muted); --ok: var(--lk-ok); --line: var(--lk-line);
      margin-top: 18px; padding: 18px 16px 16px; border-radius: var(--lk-r-xl);
      background: var(--lk-surface); border: 1px solid var(--lk-line);
      animation: lk-in .4s ease;
    }
    .exhead { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--neon);
      font-weight: 800; text-align: center; margin-bottom: 12px; }
    .exfig { display: flex; justify-content: center; align-items: center; margin-bottom: 12px; }
    .exfig svg { max-width: 100%; height: auto; overflow: visible; }
    .qfig svg { max-width: 100%; height: auto; }
    .exstage { transition: opacity .26s; }
    .excmp { gap: 26px; }
    .excol { display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 0; }
    .exlbl { text-align: center; font-size: 20px; color: var(--ink); margin-bottom: 6px; min-height: 30px;
      display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .exf { display: inline-flex; flex-direction: column; align-items: center; line-height: 1;
      font-family: "JetBrains Mono", var(--lk-mono); vertical-align: middle; }
    .exf b { font-weight: 700; font-size: 19px; font-variant-numeric: tabular-nums; }
    .exf i { width: 26px; height: 3px; border-radius: 3px; margin: 3px 0; background: var(--neon2); }
    .exeq, .exval { font-family: "JetBrains Mono", var(--lk-mono); font-weight: 700; }
    .exval { color: var(--ok); }
    .exnote { font-size: 14px; line-height: 1.45; color: var(--muted); text-align: center; margin-top: 4px; }
    .exsub { font-size: 13px; color: var(--muted); text-align: center; margin: -6px 0 8px; display: flex;
      align-items: center; justify-content: center; gap: 6px; }
    .exreplay { display: block; margin: 14px auto 0; background: transparent; border: 1.5px solid var(--line);
      color: var(--muted); font-family: inherit; font-size: 13px; font-weight: 700; padding: 9px 18px;
      border-radius: 11px; cursor: pointer; transition: border-color .2s, color .2s; }
    .exreplay:hover { border-color: var(--neon2); color: var(--ink); }
    .exreplay:active { transform: scale(.97); }

    /* ─── Экран профиля (итог, не балл) ─── */
    #profile { display: none; margin-top: 6px; }
    #profile.show { display: block; animation: lk-in .5s ease; }
    .pf-legend { display: flex; gap: 16px; font-size: 12px; color: var(--lk-muted); margin: 4px 0 16px; flex-wrap: wrap; }
    .pf-legend span { display: flex; align-items: center; gap: 6px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; flex: 0 0 12px; display: inline-block; }
    .dot.ok { background: var(--lk-ok); box-shadow: 0 0 10px var(--lk-ok); }
    .dot.warn { background: #818cf8; box-shadow: 0 0 10px #818cf8; }
    .dot.gap { background: var(--lk-bad); box-shadow: 0 0 10px var(--lk-bad); }
    .pf-map { display: grid; gap: 9px; margin-bottom: 18px; }
    .pf-theme { display: flex; align-items: center; gap: 12px; padding: 12px 14px;
      background: var(--lk-surface); border: 1px solid var(--lk-line); border-radius: var(--lk-r-lg); }
    .pf-theme .nm { font-weight: 700; font-size: 15px; flex: 1; }
    .pf-theme .st { font-size: 12px; color: var(--lk-muted); font-family: var(--lk-mono); }
    .pf-theme.tap { cursor: pointer; transition: border-color .15s, background .15s; }
    .pf-theme.tap:hover { border-color: var(--lk-indigo); }
    .pf-theme .caret { flex: 0 0 auto; color: var(--lk-muted); font-size: 13px; transition: transform .2s; }
    .pf-theme.open .caret { transform: rotate(90deg); }

    .pf-rev { display: none; margin: -4px 0 9px; padding: 4px 2px 2px; }
    .pf-rev.open { display: block; animation: lk-in .25s ease; }
    .rv-card { padding: 15px 16px; margin-bottom: 9px; border-radius: var(--lk-r-lg);
      background: var(--lk-surface); border: 1px solid var(--lk-line); }
    .rv-q { font-size: 14.5px; line-height: 1.4; font-weight: 700; color: var(--lk-ink); margin: 0 0 11px; }
    .rv-q .lk-hl { color: var(--lk-violet); }
    .rv-list { display: flex; flex-direction: column; gap: 7px; }
    .rv-opt { display: flex; align-items: center; gap: 9px; font-size: 14.5px; line-height: 1.35;
      padding: 9px 11px; border-radius: var(--lk-r-md); border: 1px solid var(--lk-line);
      background: rgba(255,255,255,.02); }
    .rv-opt .mk { flex: 0 0 auto; font-size: 14px; }
    .rv-opt .opt-key { display: inline-grid; place-items: center; width: 24px; height: 24px; border-radius: 7px;
      font-family: var(--lk-mono); font-size: 12px; font-weight: 800; background: rgba(168,85,247,.14);
      color: var(--lk-violet); border: 1px solid var(--lk-line); flex: 0 0 auto; }
    .rv-opt.ok { border-color: rgba(52,211,153,.55); background: rgba(52,211,153,.08); }
    .rv-opt.bad { border-color: rgba(244,63,94,.5); background: rgba(244,63,94,.08); }
    .rv-opt.pick { border-color: var(--lk-violet); background: rgba(168,85,247,.1); }
    .rv-opt.pick .rv-tag { color: var(--lk-violet); }
    .rv-tag { margin-left: auto; flex: 0 0 auto; font-family: var(--lk-mono); font-size: 11px;
      font-weight: 700; letter-spacing: .04em; color: var(--lk-muted); white-space: nowrap; }
    .rv-opt.ok .rv-tag { color: var(--lk-ok); }
    .rv-opt.bad .rv-tag { color: var(--lk-bad); }
    .rv-note { font-size: 13px; line-height: 1.45; color: var(--lk-muted); margin: 9px 0 0; }
    .rv-note b { color: var(--lk-ink); }
    .pf-card { padding: 18px; margin-bottom: 13px; font-size: 16px; line-height: 1.5; }
    .pf-card b { color: var(--lk-violet); }
    .cta-btn { width: 100%; margin-top: 8px; }
    .pf-note { font-size: 12px; color: var(--lk-muted); text-align: center; margin-top: 16px; opacity: .8; }

    @media (max-width: 380px) {
      .cond { font-size: 19px; }
    }
  </style>
</head>
<body class="lk-page">

  <!-- Слои микро-дофамин вспышек фона-ромбов (под контентом, над фоном) -->
  <div class="lk-flash lk-flash-correct" id="lk-fx-ok"></div>
  <div class="lk-flash lk-flash-wrong"   id="lk-fx-bad"></div>

  <!-- Звуки бум-эффекта (по URL из бренд-кита) -->
  <audio id="snd-win"  src="https://dmitrydruzhkovv-arch.github.io/di-brand-kit/sounds/win.mp3?v=2" preload="auto"></audio>
  <audio id="snd-lose" src="https://dmitrydruzhkovv-arch.github.io/di-brand-kit/sounds/lose_v2.mp3?v=2" preload="auto"></audio>

  <header class="hw-header" id="hw-header">
    <div class="hw-header-inner">
      <div class="hw-sign">
        <span class="lk-badge lk-badge-l lk-badge--sm">Λ</span>
        <span class="lk-badge lk-badge-d lk-badge--sm">D.</span>
      </div>
      <span class="hw-prog-label" id="prog-label">1 из 14</span>
      <div class="lk-progress"><div class="lk-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
  </header>

  <div class="lk-app" style="padding-top:22px">
    <div id="screen"></div>
    <div id="profile"></div>
  </div>

  <script src="app.js?v=8"></script>
</body>
</html>
